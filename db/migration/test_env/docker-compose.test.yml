services:
  postgres-mig-test:
    build: ../../postgres
    restart: "no"
    ports:
      - "25432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=gtrpgm
    volumes:
      # Use a fresh, temporary volume for the test
      - ./initdb:/docker-entrypoint-initdb.d
      - mig_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  mig_test_data:
